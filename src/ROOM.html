<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="container mt-5">
    <h2 class="text-center">Login</h2>
    <div class="row justify-content-center">
        <div class="col-md-4">
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </div>
</div>

<!-- Main Voting System -->
<div id="mainPage" class="container mt-5 d-none">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Election System</a>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <header class="bg-primary text-white text-center py-4">
        <h1>Online Election Voting System</h1>
        <p>Vote for your preferred candidate below</p>
    </header>

    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-center">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Candidate A</h5>
                    <p>Party: ACT WAZALENDO</p>
                    <button class="btn btn-success vote-btn" data-candidate="A">Vote</button>
                    <p class="mt-2">Votes: <span id="votes-A">0</span></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Candidate B</h5>
                    <p>Party: CHADEMA</p>
                    <button class="btn btn-success vote-btn" data-candidate="B">Vote</button>
                    <p class="mt-2">Votes: <span id="votes-B">0</span></p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center">
                <img src="https://via.placeholder.com/300" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Candidate C</h5>
                    <p>Party: CCM</p>
                    <button class="btn btn-success vote-btn" data-candidate="C">Vote</button>
                    <p class="mt-2">Votes: <span id="votes-C">0</span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="my-5">
        <h2 class="text-center">Live Election Results</h2>
        <canvas id="voteChart"></canvas>
    </div>
</div>

<script>
    let votes = { A: 0, B: 0, C: 0 };
    let voteChartCtx = document.getElementById('voteChart').getContext('2d');
    let voteChart = new Chart(voteChartCtx, {
      type: 'bar',
      data: {
        labels: ['Candidate A', 'Candidate B', 'Candidate C'],
        datasets: [{
          label: 'Votes',
          data: [0, 0, 0],
          backgroundColor: ['red', 'blue', 'green'],
          borderColor: ['darkred', 'darkblue', 'darkgreen'],
          borderWidth: 1
        }]
      },
      options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });

    document.querySelectorAll('.vote-btn').forEach(button => {
      button.addEventListener('click', function() {
        let candidate = this.getAttribute('data-candidate');
        votes[candidate]++;
        document.getElementById('votes-' + candidate).textContent = votes[candidate];
        updateChart();
        alert('Vote recorded for ' + candidate + '!');
      });
    });

    function updateChart() {
      voteChart.data.datasets[0].data = [votes.A, votes.B, votes.C];
      voteChart.update();
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent form from submitting

        let username = document.getElementById('username').value;
        sessionStorage.setItem('user', username); // Store the username in session
        showMainPage(); // Show the voting page
    });

    document.getElementById('logoutBtn').addEventListener('click', function() {
        sessionStorage.removeItem('user');
        showLoginPage(); // Go back to login page
    });

    function showMainPage() {
        document.getElementById('loginPage').classList.add('d-none');
        document.getElementById('mainPage').classList.remove('d-none');
    }

    function showLoginPage() {
        document.getElementById('loginPage').classList.remove('d-none');
        document.getElementById('mainPage').classList.add('d-none');
    }

    // Check session on page load
    if (sessionStorage.getItem('user')) {
        showMainPage();
    } else {
        showLoginPage();
    }eeevf
</script>

</body>
</html>
