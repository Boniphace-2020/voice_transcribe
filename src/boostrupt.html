<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title align="center">Election Voting System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Election System</a>
  </div>
</nav>

<!-- Header Section -->
<header class="bg-primary text-white text-center py-4">
  <h1>Online Election Voting System</h1>
  <p>Vote for your preferred candidate below</p>
</header>

<!-- Candidates Section -->
<div class="container mt-4">
  <div class="row">
    <!-- Candidate 1 -->
    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top" alt="Candidate 1">
        <div class="card-body text-center">
          <h5 class="card-title">Candidate A</h5>
          <p class="card-text">Party: Alpha</p>
          <button class="btn btn-success vote-btn" data-candidate="A">Vote</button>
          <p class="mt-2">Votes: <span id="votes-A">0</span></p>
        </div>
      </div>
    </div>

    <!-- Candidate 2 -->
    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top" alt="Candidate 2">
        <div class="card-body text-center">
          <h5 class="card-title">Candidate B</h5>
          <p class="card-text">Party: Beta</p>
          <button class="btn btn-success vote-btn" data-candidate="B">Vote</button>
          <p class="mt-2">Votes: <span id="votes-B">0</span></p>
        </div>
      </div>
    </div>

    <!-- Candidate 3 -->
    <div class="col-md-4">
      <div class="card">
        <img src="https://via.placeholder.com/300" class="card-img-top" alt="Candidate 3">
        <div class="card-body text-center">
          <h5 class="card-title">Candidate C</h5>
          <p class="card-text">Party: Gamma</p>
          <button class="btn btn-success vote-btn" data-candidate="C">Vote</button>
          <p class="mt-2">Votes: <span id="votes-C">0</span></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Graph Section -->
<div class="container my-5">
  <h2 class="text-center">Live Election Results</h2>
  <canvas id="voteChart"></canvas>
</div>

<!-- JavaScript for Voting System and Graph -->
<script>
  let votes = { A: 0, B: 0, C: 0 };
  let voteChartCtx = document.getElementById('voteChart').getContext('2d');

  // Create initial chart
  let voteChart = new Chart(voteChartCtx, {
      type: 'bar',
      data: {
          labels: ['Candidate A', 'Candidate B', 'Candidate C'],
          datasets: [{
              label: 'Votes',
              data: [0, 0, 0],
              backgroundColor: ['red', 'blue', 'green'],
              borderColor: ['darkred', 'darkblue', 'darkgreen'],
              borderWidth: 1
          }]
      },
      options: {
          responsive: true,
          scales: {
              y: { beginAtZero: true }
          }
      }
  });

  // Voting logic
  document.querySelectorAll('.vote-btn').forEach(button => {
      button.addEventListener('click', function() {
          let candidate = this.getAttribute('data-candidate');
          votes[candidate]++;
          document.getElementById('votes-' + candidate).textContent = votes[candidate];
          updateChart();
          alert('Vote recorded for ' + candidate + '!');
      });
  });

  // Update the chart dynamically
  function updateChart() {
      voteChart.data.datasets[0].data = [votes.A, votes.B, votes.C];
      voteChart.update();
  }
</script>

</body>
</html>
