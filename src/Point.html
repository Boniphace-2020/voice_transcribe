<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <link rel="stylesheet" href="styless.css">
</head>
<body>
<header>
    <div class="logo">
        <img src="school-logo.png" alt="School Logo">
        <h1>School Management System</h1>
    </div>
    <nav>
        <ul>
            <li><a href="#" id="home-link">Home</a></li>
            <li><a href="#" id="students-link">Students</a></li>
            <li><a href="#" id="events-link">Events</a></li>
        </ul>
    </nav>
</header>

<main id="main-content">
    <!-- Home Section -->
    <section id="home" class="content-section">
        <h2>Welcome to the School Management System</h2>
        <p>This platform helps you manage students and events effectively!</p>
    </section>

    <!-- Students Management Section -->
    <section id="students" class="content-section" style="display: none;">
        <h2>Manage Students</h2>
        <button id="add-student-btn">Add New Student</button>
        <table id="students-list">
            <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Class</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <!-- Student rows will be added dynamically here -->
            </tbody>
        </table>
    </section>

    <!-- Events Management Section -->
    <section id="events" class="content-section" style="display: none;">
        <h2>Manage Events</h2>
        <button id="add-event-btn">Add New Event</button>
        <ul id="events-list">
            <!-- Event list will be added dynamically here -->
        </ul>
    </section>
</main>

<footer>
    <p>&copy; 2025 School Management System. All Rights Reserved.</p>
</footer>

<script src="scripts.js"></script>
</body>
</html>
